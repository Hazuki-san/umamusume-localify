name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Generate project files
        shell: cmd
        run: call generate.bat

      - name: Generate loader project files
        shell: cmd
        working-directory: loader
        run: call generate.bat

      - name: Restore NuGet packages
        shell: cmd
        run: nuget restore build\packages.config -PackagesDirectory build\packages

      - name: Resolve WebView2 NuGet root
        shell: pwsh
        run: |
          $pkgs = Get-ChildItem -Path "build/packages" -Directory -Filter "Microsoft.Web.WebView2.*"
          if (-not $pkgs) { throw "Microsoft.Web.WebView2 package directory not found under build/packages." }
          if ($pkgs.Count -ne 1) { throw "Expected exactly one Microsoft.Web.WebView2 package directory under build/packages, found $($pkgs.Count)." }
          "WEBVIEW2_NUGET_ROOT=$($pkgs[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build main project
        shell: cmd
        run: msbuild build\umamusume-localify.slnx /restore /m /p:Configuration=Release /p:Platform=x64 /p:NugetRoot=%WEBVIEW2_NUGET_ROOT%

      - name: Build loader project
        shell: cmd
        run: msbuild loader\build\umamusume-localify-loader.slnx /restore /m /p:Configuration=Release /p:Platform=x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-release
          path: |
            build\bin\x64\Release\localify.*
            loader\build\bin\x64\Release\loader.*
