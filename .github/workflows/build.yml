name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Generate project files
        shell: cmd
        run: call generate.bat

      - name: Generate loader project files
        shell: cmd
        working-directory: loader
        run: call generate.bat

      - name: Restore NuGet packages
        shell: cmd
        run: nuget restore build\packages.config -PackagesDirectory build\packages

      - name: Build main project
        shell: cmd
        run: msbuild build\umamusume-localify.slnx /restore /m /p:Configuration=Release /p:Platform=x64 /p:NugetRoot=%CD%\build\packages\Microsoft.Web.WebView2.1.0.3650.58

      - name: Build loader project
        shell: cmd
        run: msbuild loader\build\umamusume-localify-loader.slnx /restore /m /p:Configuration=Release /p:Platform=x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-release
          path: |
            build\bin\x64\Release\localify.*
            loader\build\bin\x64\Release\loader.*
